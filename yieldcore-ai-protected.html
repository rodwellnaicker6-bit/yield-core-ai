<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="YieldCore"/>

<title>YieldCore AI · Smart Farming SA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --g1:#22c55e;--g2:#16a34a;--bg:#020b12;--bg2:#0a1a0c;--bg3:#051008;
  --border:#132a16;--muted:#3a6a3d;--dim:#1a3a1d;--text:#e2e8f0;--sub:#94a3b8;
}
html,body{background:var(--bg);color:var(--text);font-family:'Sora',system-ui,sans-serif;min-height:100dvh;overflow-x:hidden;max-width:430px;margin:0 auto}
input,select,textarea,button{font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none}
::-webkit-scrollbar{width:0;background:transparent}
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&display=swap');

/* UTILS */
.flex{display:flex}.col{flex-direction:column}.center{align-items:center}.between{justify-content:space-between}.wrap{flex-wrap:wrap}
.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.w100{width:100%}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}
.bold{font-weight:800}.xbold{font-weight:900}.small{font-size:10px}.tiny{font-size:9px}
.muted{color:var(--muted)}.dim{color:var(--dim)}.green{color:var(--g1)}.white{color:#fff}
.upper{text-transform:uppercase;letter-spacing:1.5px}
.lh{line-height:1.6}

/* LAYOUT */
#app{display:flex;flex-direction:column;min-height:100dvh;padding-top:env(safe-area-inset-top)}
#header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid #0a1f0d;padding:10px 16px 8px}
#content{flex:1;overflow-y:auto;padding-bottom:80px}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:1px solid #0a1f0d;display:flex;padding-bottom:env(safe-area-inset-bottom,8px);z-index:200}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:9px}
.card-danger{border-color:#7f1d1d!important}
.card-warn{border-color:#713f12!important}
.card-glow{border-color:#22c55e33!important}

/* INPUTS */
.inp{width:100%;background:var(--bg2);border:1px solid #1a3a1d;border-radius:11px;padding:12px 13px;color:var(--text);font-size:14px}
.lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:4px;display:block}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--g2),var(--g1));border:none;border-radius:13px;color:#000;font-size:15px;font-weight:800;cursor:pointer}
.btn-secondary{width:100%;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;text-align:left}
.btn-sm{padding:7px 14px;border-radius:99px;font-size:11px;font-weight:700;border:none;cursor:pointer}

/* BADGES */
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:700}
.badge-green{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44}
.badge-blue{background:#38bdf822;color:#38bdf8;border:1px solid #38bdf844}
.badge-red{background:#f8717122;color:#f87171;border:1px solid #f8717144}
.badge-yellow{background:#facc1522;color:#facc15;border:1px solid #facc1544}
.badge-purple{background:#a78bfa22;color:#a78bfa;border:1px solid #a78bfa44}
.badge-orange{background:#fb923c22;color:#fb923c;border:1px solid #fb923c44}

/* SUB TABS */
.subtabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px}
.subtab{padding:6px 13px;border-radius:99px;font-size:11px;font-weight:700;border:none;cursor:pointer;white-space:nowrap;transition:all .2s}
.subtab.active{background:var(--g1);color:#000}
.subtab:not(.active){background:var(--bg2);color:var(--muted)}

/* NAV BUTTONS */
.navbtn{flex:1;padding:9px 0 5px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.navbtn .icon{font-size:19px;transition:all .2s}
.navbtn .label{font-size:9px;transition:color .2s}
.navbtn.active .icon{transform:scale(1.15)}
.navbtn.active .label{color:var(--g1);font-weight:800}
.navbtn:not(.active) .icon{filter:grayscale(1) opacity(.3)}
.navbtn:not(.active) .label{color:#1a3a1d;font-weight:400}

/* SENSOR GRID */
.sensor-card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:12px 13px}
.sensor-val{font-size:18px;font-weight:900;margin-top:4px;margin-bottom:2px}

/* CHAT */
.chat-bubble{max-width:86%;padding:10px 13px;border-radius:13px;font-size:13px;line-height:1.6}
.chat-user{background:linear-gradient(135deg,var(--g2),var(--g1));color:#000;margin-left:auto}
.chat-ai{background:var(--bg2);color:#cbd5e1;border:1px solid var(--border)}

/* ANIMATIONS */
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotPulse{0%,100%{opacity:.4}50%{opacity:1}}
.fade-in{animation:fadeIn .35s ease both}

/* TERRAIN CANVAS */
#terrainCanvas{width:100%;border-radius:12px;display:block}

/* COPYRIGHT SHIELD */
.yc-copyright{display:none!important}
</style>
</head>

// ── 3D TERRAIN ─────────────────────────────────────────────────────────────
function _startTerrain(f){
  const canvas=document.getElementById('terrainCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,G=26,seed=f.id*213.7;
  const n=(x,y)=>Math.sin(x*.35+seed)*Math.cos(y*.35+seed)*.5+Math.sin(x*.8+seed*1.7)*Math.cos(y*.6+seed)*.3+Math.sin(x*1.5+seed*3)*Math.cos(y*1.2+seed)*.2;
  const toS=(x,y,z,a)=>{const cx=Math.cos(a),sx=Math.sin(a),rx=x*cx-y*sx,ry=x*sx+y*cx,sc=175/(ry+9);return{sx:W/2+rx*sc,sy:H/2-z*sc*.85+ry*sc*.28};};
  function draw(a){
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#020b12');bg.addColorStop(1,'#051a0a');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    for(let yi=G-1;yi>=0;yi--){
      for(let xi=0;xi<G;xi++){
        const px=(xi/G-.5)*10,py=(yi/G-.5)*10;
        const h=n(xi*.45,yi*.45)*2+.6,hn=n((xi+1)*.45,yi*.45)*2+.6,hd=n(xi*.45,(yi+1)*.45)*2+.6,hnd=n((xi+1)*.45,(yi+1)*.45)*2+.6;
        const avg=(h+hn+hd+hnd)/4;
        const p1=toS(px,py,h,a),p2=toS(px+10/G,py,hn,a),p3=toS(px+10/G,py+10/G,hnd,a),p4=toS(px,py+10/G,hd,a);
        let fill;
        const isR=(xi%7===0||yi%7===0)&&avg<.9,isW=avg<-.2;
        if(isW)fill=`rgba(30,100,180,${.7+avg*.2})`;
        else if(isR)fill='rgb(160,130,70)';
        else if(avg>1.4)fill=`rgb(${140+avg*30|0},${160+avg*20|0},90)`;
        else if(avg>.5)fill=`rgb(${30+avg*30|0},${110+avg*40|0},${30+avg*20|0})`;
        else fill=`rgb(${60+avg*40|0},${90+avg*50|0},${25+avg*20|0})`;
        ctx.beginPath();ctx.moveTo(p1.sx,p1.sy);ctx.lineTo(p2.sx,p2.sy);ctx.lineTo(p3.sx,p3.sy);ctx.lineTo(p4.sx,p4.sy);ctx.closePath();
        ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=.4;ctx.stroke();
      }
    }
    ctx.fillStyle='rgba(34,197,94,.9)';ctx.font='bold 10px monospace';ctx.fillText(f.n,8,16);
    ctx.fillStyle='rgba(34,197,94,.5)';ctx.font='9px monospace';ctx.fillText(`${f.h}ha · ${f.lat.toFixed(3)}°S ${f.lon.toFixed(3)}°E`,8,28);ctx.fillText('DEM · '+f.pv,8,40);
  }
  function loop(){_state.terrainAngle+=.0025;draw(_state.terrainAngle);_state.terrainAnim=requestAnimationFrame(loop);}
  loop();
}

// ── DRONES ─────────────────────────────────────────────────────────────────

    <div class="grid4">
      ${[['Total',_dd.length,'#38bdf8'],['Ready',ready,'#22c55e'],['In Flight',flight,'#a78bfa'],['Down',_dd.length-ready-flight,'#facc15']].map(([l,v,c])=>`

    const bc=d.bat>60?'#22c55e':d.bat>30?'#facc15':'#f87171';
    const sc=d.st==='In Flight'?'badge-purple':d.st==='Ready'?'badge-green':d.st==='Charging'?'badge-yellow':'badge-red';
    dc.innerHTML=`<div class="flex between mb10" style="align-items:flex-start">
      <div>
        <div style="font-size:15px;font-weight:800">🚁 ${d.n} <span class="badge ${sc}">${d.st}</span></div>
        <div class="small muted mt4">${d.t}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">Assigned: ${farm?.n||'Unassigned'}</div>
      </div>
      <div style="font-size:18px;font-weight:900;color:${bc}">🔋${d.bat}%</div>
    </div>
    <div class="grid2 mb10">
      ${[['Range',d.r],['Camera',d.cam],['Payload',d.pay]].map(([l,v])=>`
        <div style="background:var(--bg3);border-radius:8px;padding:7px 9px">
          <div style="font-size:9px;color:var(--muted)">${l}</div>
          <div style="font-size:11px;font-weight:700;color:var(--sub);margin-top:1px">${v}</div>
        </div>`).join('')}
    </div>
    <div class="flex gap6">
      <button class="btn-sm w100" style="background:${d.st==='Ready'?'linear-gradient(135deg,#1a2a6a,#2a3a8a)':'var(--bg2)'};color:${d.st==='Ready'?'#38bdf8':'var(--muted)'};border:1px solid ${d.st==='Ready'?'#38bdf8':'var(--border)'}" onclick="launchDrone(${d.id})">🚀 Launch Survey</button>
      <button class="btn-sm w100" style="background:var(--bg2);border:1px solid var(--border);color:var(--muted)">📋 View Log</button>
    </div>`;
    w.appendChild(dc);
  });

  const info=_el('div','card');
  info.style.cssText='background:linear-gradient(135deg,#0a0f1a,#051020);border:1px solid #1a2a4a;margin-top:4px';
  info.innerHTML=`<div style="font-size:12px;font-weight:800;margin-bottom:8px">🌐 Remote Drone Control</div>
    <div style="font-size:12px;color:#3a5a8a;line-height:1.6">Launch surveys remotely from anywhere in the world. Drones dispatched via satellite uplink. Live feed during flight.</div>
    <div class="flex wrap gap6 mt10">
      ${['Multispectral NDVI','Thermal Stress','Pest Detection','Water Stress','3D Mapping'].map(m=>`<span class="badge badge-blue" style="font-size:10px">${m}</span>`).join('')}

window.launchDrone=function(id){
  const d=_dd.find(x=>x.id===id);
  if(d&&d.st==='Ready'){
    const farm=_fd.find(f=>f.id===d.fid);
    switchTab('ai');
    setTimeout(()=>_sendAI(`Launch drone ${d.n} to survey ${farm?.n}. Report on crop health, moisture stress, NDVI zones, and any visible issues needing attention.`),300);
  }
};

// ── AI ─────────────────────────────────────────────────────────────────────
function _buildAI(w){
  w.style.padding='12px 13px 0';
  const hdr=_el('div','card card-glow mb10');
  hdr.innerHTML=`<div style="font-size:13px;font-weight:800">🤖 YieldCore AI Advisor</div>
    <div class="small muted mt4 lh">SA-specific: load-shedding, water restrictions, pests, markets, soil, drones${_state.selFarm?` · <span style="color:var(--g1)">${_state.selFarm.n}</span>`:''}</div>`;
  w.appendChild(hdr);

  const chatArea=_el('div','');chatArea.id='chatArea';chatArea.style.cssText='min-height:180px;max-height:calc(100dvh - 300px);overflow-y:auto;margin-bottom:10px';
  
  if(_state.aiChat.length===0){
    const qs=_el('div','');
    ['What crops should I plant in Free State this summer?','How does load-shedding affect irrigation pumps?','Best drones for 500ha wheat survey in SA?','Fall armyworm treatment for sugarcane?','Solar ROI for 200ha Northern Cape farm?','Optimal pivot schedule for Limpopo citrus?'].forEach(q=>{
      const b=_el('button','btn-secondary mb6');b.textContent='💬 '+q;b.onclick=()=>_sendAI(q);qs.appendChild(b);
    });
    chatArea.appendChild(qs);
  }

  _state.aiChat.forEach(m=>{
    const d=_el('div','flex mb8');d.style.justifyContent=m.r==='user'?'flex-end':'flex-start';
    const b=_el('div','chat-bubble '+(m.r==='user'?'chat-user':'chat-ai'));b.textContent=m.c;d.appendChild(b);chatArea.appendChild(d);
  });

  if(_state.aiLoading){const l=_el('div','card small muted');l.textContent='🌿 Analyzing SA farm data…';chatArea.appendChild(l);}
  w.appendChild(chatArea);

  const inp=_el('div','flex gap6');inp.style.position='sticky';inp.style.bottom='85px';
  const ti=_el('input','inp');ti.id='aiInput';ti.placeholder='Ask about any SA farm, crop, drone, solar…';
  ti.style.flex='1';ti.onkeydown=e=>{if(e.key==='Enter')_sendAI(ti.value);};
  const sb=_el('button','');
  sb.style.cssText='background:linear-gradient(135deg,#16a34a,#22c55e);border:none;border-radius:11px;width:46px;font-size:18px;cursor:pointer;color:#000;font-weight:900';
  sb.textContent='↑';sb.onclick=()=>_sendAI(document.getElementById('aiInput').value);
  inp.appendChild(ti);inp.appendChild(sb);w.appendChild(inp);

  setTimeout(()=>{if(chatArea)chatArea.scrollTop=chatArea.scrollHeight;},50);
}

async function _sendAI(msg){
  if(!msg||!msg.trim())return;
  const f=_state.selFarm,sr=f?_state.sensors[f.id]||{}:{};
  const ctx=f?`Farm: ${f.n}, ${f.pv}, ${f.h}ha. Crops: ${f.c.join(', ')}. Soil: ${f.soil}. Water: ${f.w}. Sensors — Moisture:${sr.moist?.toFixed(0)}%, Temp:${sr.temp?.toFixed(1)}°C, NDVI:${sr.ndvi?.toFixed(2)}.`:`Platform: YieldCore AI — ${_fd.length} farms across all 9 SA provinces.`;
  _state.aiChat.push({r:'user',c:msg});_state.aiLoading=true;
  const inp=document.getElementById('aiInput');if(inp)inp.value='';
  _renderTab('ai');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:`You are YieldCore AI — precision agriculture intelligence for South African farms. ${ctx} Give practical SA-specific advice. Reference load-shedding, Eskom, water restrictions, fall armyworm, rand input costs. Max 4 sentences. Be direct and actionable.`,
        messages:_state.aiChat.map(m=>({role:m.r==='user'?'user':'assistant',content:m.c}))})
    });
    const d=await res.json();
    _state.aiChat.push({r:'ai',c:d.content?.[0]?.text||'No response.'});
  }catch{_state.aiChat.push({r:'ai',c:'Network error. Please try again.'});}
  _state.aiLoading=false;_renderTab('ai');
}
window._sendAI=_sendAI;
